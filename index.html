<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planeta Reggae Space</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* VIDEO FUNDO */

#bg-video{
position:fixed;
top:50%;
left:50%;

min-width:100%;
min-height:100%;

width:auto;
height:auto;

transform:translate(-50%,-50%);

object-fit:cover;

z-index:-3;
}

/* OVERLAY SUAVE */

body::before{
content:"";

position:fixed;
inset:0;

background:rgba(0,0,0,.18);

z-index:-2;
}

/* ENCARTe COM BLUR */

.video-overlay{
position:fixed;

top:0;
left:0;

width:100%;
height:90px;

background:
linear-gradient(
180deg,
rgba(0,0,0,.28),
rgba(0,0,0,.10),
rgba(0,0,0,0)
);

backdrop-filter:
blur(8px);

-webkit-backdrop-filter:
blur(8px);

z-index:-1;

pointer-events:none;
}

/* CONTAINER */

.container{
padding:20px;
}

/* AVATAR */

.avatar{
width:140px;
height:140px;

border-radius:50%;

margin:80px auto 10px;

background:
linear-gradient(
45deg,
cyan,
blue,
purple
);

padding:4px;

animation:
glow 4s infinite linear;
}

.avatar img{
width:100%;
height:100%;
border-radius:50%;
}

@keyframes glow{

0%{
filter:hue-rotate(0deg);
}

100%{
filter:hue-rotate(360deg);
}

}

/* NOME */

.nome-img{
width:220px;
display:block;
margin:10px auto 5px;
}

/* LOGO */

.logo{
width:260px;
display:block;
margin:10px auto 20px;
}

/* CARD */

.card{
background:transparent;
border:none;
box-shadow:none;
padding:10px;
margin:15px auto;
max-width:500px;
}

/* PLAYER */

#player{
width:100%;
height:260px;

background:
rgba(0,0,0,0.25);

backdrop-filter:
blur(10px);

border-radius:12px;

position:relative;
overflow:hidden;
}

/* BORDA PLAYER */

#player::before{
content:"";

position:absolute;
inset:0;

border-radius:12px;

border:
1px solid rgba(255,255,255,0.25);

box-shadow:
0 0 6px rgba(255,255,255,0.25),
0 0 14px rgba(255,255,255,0.15);

pointer-events:none;
}

/* RADIO AO VIVO */

.now-playing{
position:absolute;
top:40px;

width:100%;

display:flex;
justify-content:center;

gap:8px;

font-size:13px;
}

.music-icon{
color:cyan;
}

/* ESPECTRO */

.spectrum{
display:flex;

justify-content:center;
align-items:flex-end;

width:100%;
height:110px;

gap:2px;

margin-top:55px;
}

.bar{
width:3px;

background:
linear-gradient(
cyan,
purple
);

animation:
bounce 1s infinite ease-in-out;
}

.bar:nth-child(3n){
animation-delay:.2s;
}

.bar:nth-child(4n){
animation-delay:.4s;
}

.bar:nth-child(5n){
animation-delay:.6s;
}

@keyframes bounce{

0%,100%{
height:10px;
}

50%{
height:100px;
}

}

/* CONTROLES */

.controls{
position:absolute;
bottom:35px;
width:100%;
}

.control-row{
display:flex;

justify-content:center;
align-items:center;

gap:10px;
}

/* BOTÕES */

button{
background:
linear-gradient(
45deg,
cyan,
purple
);

border:none;

padding:6px 10px;

font-size:12px;

color:#fff;

border-radius:6px;

cursor:pointer;
}

/* VOLUME */

.volume-icon{
font-size:20px;
}

input[type="range"]{
width:120px;
}

/* LINKS */

.link-btn{
display:inline-block;

background:
linear-gradient(
45deg,
cyan,
purple
);

padding:10px 16px;

margin:6px;

color:white;

border-radius:6px;

text-decoration:none;
}

/* FRASE */

.frase-final{
font-size:18px;

font-style:italic;

background:
linear-gradient(
90deg,
cyan,
purple,
cyan
);

background-size:200%;

-webkit-background-clip:text;

color:transparent;

animation:
shine 4s linear infinite;
}

@keyframes shine{

0%{
background-position:0%;
}

100%{
background-position:200%;
}

}

</style>
</head>

<body>

<!-- VIDEO FUNDO -->

<video autoplay muted loop playsinline id="bg-video">

<source src="https://files.catbox.moe/osr934.mp4" type="video/mp4">

<!-- ENCARTe -->

<!-- NOME -->

<!-- LOGO -->

<!-- PLAYER -->

Rádio ao vivo

<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>

</div>

<!-- CONTROLES -->

<div class="controls">

<div class="control-row">

type="range"
min="0"

</div>

</div>

<audio
id="audio"
src="https://servidor13.brlogic.com:7020/live">
</audio>

</div>

<!-- LINKS -->

<div class="card">

<a href="https://xat.com/planetareggae" target="_blank" class="link-btn">Chat</a>

<a href="https://xat.com/ajuda" target="_blank" class="link-btn">Ajuda</a>

<a href="https://xat.com/loja" target="_blank" class="link-btn">Loja</a>

<a href="https://instagram.com/planetareggaeofc" target="_blank" class="link-btn">Instagram</a>

</div>

<!-- FRASE -->

<div class="card">

<div class="frase-final">

"Não vim pra me curvar, eu vim para conquistar"

</div>

</div>

</div>

<script>

var audio =
document.getElementById("audio");

function play(){
audio.play();
}

function pause(){
audio.pause();
}

function mute(){
audio.muted = !audio.muted;
}

function volume(v){
audio.volume = v;
}

</script>

</body>
</html>
