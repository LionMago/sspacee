<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planeta Reggae Space</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }

    /* VÍDEO DE FUNDO */
    .video {
      position: fixed;
      inset: 0;
      z-index: -10;
      overflow: hidden;
      background: #000;
    }

    #bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* ESCURECE LEVEMENTE O FUNDO, SEM COBRIR O CONTEÚDO */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -9;
      background: rgba(0, 0, 0, .18);
      pointer-events: none;
    }

    /* TARJA SUPERIOR */
    .top-banner {
      position: fixed;
      top: -6px;
      left: 0;
      z-index: 9999;
      width: 100%;
      height: 100px;
      overflow: hidden;
      pointer-events: none;
    }

    .top-banner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .98;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, .18));
    }

    .container { padding: 20px; }

    /* AVATAR */
    .avatar {
      width: 140px;
      height: 140px;
      margin: 100px auto 10px;
      padding: 4px;
      border-radius: 50%;
      background: linear-gradient(45deg, cyan, blue, purple);
      animation: glow 4s linear infinite;
    }

    .avatar img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    @keyframes glow { to { filter: hue-rotate(360deg); } }

    /* NOME ANIMADO: sem borda ou película visível sobre o fundo. */
    #name-video {
      display: block;
      width: min(950px, 150vw);
      height: auto;
      margin: 5px auto 5px;
      border: 0;
      outline: 0;
      background: transparent;
      box-shadow: none;
      object-fit: contain;
      mix-blend-mode: darken;
    }

    .logo {
      display: block;
      width: min(260px, 80vw);
      height: auto;
      margin: 10px auto 20px;
    }

    .card {
      max-width: 950px;
      margin: 15px auto;
      padding: 10px;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    /* PLAYER */
    #player {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(0, 0, 0, .25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #player::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: inherit;
      box-shadow: 0 0 6px rgba(255, 255, 255, .25), 0 0 14px rgba(255, 255, 255, .15);
      pointer-events: none;
    }

    .now-playing {
      position: absolute;
      top: 40px;
      display: flex;
      justify-content: center;
      width: 100%;
      gap: 8px;
      font-size: 13px;
    }

    .music-icon { color: cyan; }

    .spectrum {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      width: 100%;
      height: 110px;
      gap: 2px;
      margin-top: 55px;
    }

    .bar {
      width: 3px;
      height: 10px;
      background: linear-gradient(cyan, purple);
      animation: bounce 1s ease-in-out infinite;
    }

    .bar:nth-child(3n) { animation-delay: .2s; }
    .bar:nth-child(4n) { animation-delay: .4s; }
    .bar:nth-child(5n) { animation-delay: .6s; }
    @keyframes bounce { 50% { height: 100px; } }

    .controls { position: absolute; bottom: 35px; width: 100%; }
    .control-row { display: flex; align-items: center; justify-content: center; gap: 10px; }

    button, .link-btn {
      border: 0;
      border-radius: 6px;
      background: linear-gradient(45deg, cyan, purple);
      color: #fff;
    }

    button { padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .volume-icon { font-size: 20px; }
    input[type="range"] { width: 120px; }

    .link-btn {
      display: inline-block;
      margin: 6px;
      padding: 10px 16px;
      text-decoration: none;
    }

    .frase-final {
      color: transparent;
      font-size: 18px;
      font-style: italic;
      background: linear-gradient(90deg, cyan, purple, cyan);
      background-size: 200%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 4s linear infinite;
    }

    @keyframes shine { to { background-position: 200%; } }
  </style>
</head>
<body>
  <!-- VÍDEO DE FUNDO: a div agora está fechada corretamente -->
  <div class="video">
    <video id="bg-video" autoplay muted loop playsinline aria-hidden="true">
      <source src="https://files.catbox.moe/osr934.mp4" type="video/mp4">
    </video>
  </div>

  <div class="top-banner">
    <img src="https://xatimg.com/image/Itu5HoN7wI75.png" alt="">
  </div>

  <main class="container">
    <div class="avatar">
      <img src="https://xatimg.com/image/rQ4RqinIaDXx.gif" alt="Avatar Planeta Reggae">
    </div>

    <!-- VÍDEO DO NOME -->
    <video id="name-video" autoplay muted loop playsinline aria-label="Nome animado">
      <source src="https://files.catbox.moe/kn5km3.mp4" type="video/mp4">
    </video>

    <img src="https://xatimg.com/image/MVORqy3CCDrW.png" class="logo" alt="Planeta Reggae">

    <section class="card">
      <div id="player">
        <div class="now-playing">
          <span class="music-icon" aria-hidden="true">🎵</span>
          <span id="nowplaying">Rádio ao vivo</span>
        </div>

        <div class="spectrum" aria-hidden="true">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="controls">
          <div class="control-row">
            <button type="button" id="play-button" aria-label="Tocar rádio">▶</button>
            <button type="button" id="pause-button" aria-label="Pausar rádio">⏸</button>
            <button type="button" id="mute-button" aria-label="Ativar ou desativar som">🔇</button>
            <span class="volume-icon" aria-hidden="true">🔊</span>
            <input id="volume-control" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
          </div>
        </div>

        <audio id="audio" src="https://servidor13.brlogic.com:7020/live"></audio>
      </div>
    </section>

    <nav class="card" aria-label="Links">
      <a href="https://xat.com/planetareggae" target="_blank" rel="noopener noreferrer" class="link-btn">Chat</a>
      <a href="https://xat.com/ajuda" target="_blank" rel="noopener noreferrer" class="link-btn">Ajuda</a>
      <a href="https://xat.com/loja" target="_blank" rel="noopener noreferrer" class="link-btn">Loja</a>
      <a href="https://instagram.com/planetareggaeofc" target="_blank" rel="noopener noreferrer" class="link-btn">Instagram</a>
    </nav>

    <section class="card">
      <div class="frase-final">“Não vim pra me curvar, eu vim para conquistar”</div>
    </section>
  </main>

  <script>
    const audio = document.getElementById('audio');
    const volumeControl = document.getElementById('volume-control');

    document.getElementById('play-button').addEventListener('click', () => {
      audio.play().catch(() => {});
    });
    document.getElementById('pause-button').addEventListener('click', () => audio.pause());
    document.getElementById('mute-button').addEventListener('click', () => {
      audio.muted = !audio.muted;
    });
    volumeControl.addEventListener('input', (event) => {
      audio.volume = Number(event.target.value);
    });
  </script>
</body>
</html>
